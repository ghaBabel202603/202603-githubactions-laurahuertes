name: 13 - Working with Outputs
on:
    workflow_dispatch:
        inputs:
            build-status:
                description: 'Choose the build status for the demo'
                type: choice
                options:
                    - success
                    - failure
                default: success
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Print GITHUB_OUTPUT path
              run: |
                echo "GITHUB_OUTPUT: ${{env.GITHUB_OUTPUT}}"
            - name: Build
              id: build
              run: |
                echo "status=${{github.event.inputs.build-status}}" >> ${{env.GITHUB_OUTPUT}}
                echo "status=${{github.event.inputs.build-status}}"
        outputs:
            build-status: ${{steps.build.outputs.status}}
    deploy:
        runs-on: ubuntu-latest          
        needs: build
        if: ${{needs.build.outputs.build-status == 'success'}}
        steps:
            - name: Deploy
              run: echo "Deploying"             
