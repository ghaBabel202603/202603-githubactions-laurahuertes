name: 14 - Using Cache
on:
  workflow_dispatch:
    inputs:
      use-cache:
        description: "Whether to execute cache step"
        required: true
        type: boolean
        default: true
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - uses: actions/cache@v4
        id: cache
        with:
          key: ejercicio-14-${{hashFiles('**/package-lock.json')}}
          path: react-app/node_modules
          restore-keys: |
            ejercicio-14-
            ejercicio-
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
      - name: Building
        run: npm run build
      - name: Deploying to nonprod
        run: echo "Deploying to nonprod"
 